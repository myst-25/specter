name: Crowdin Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # weekly: Monday 06:00 UTC
  push:
    paths: ['src/webroot/lang/source/string.json']
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Upload sources to Crowdin
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: false
          push_translations: false
          create_pr: false
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Download translations from Crowdin
        uses: crowdin/github-action@v2
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          push_translations: false
          create_pr: true
          localization_branch_name: l10n_crowdin
          commit_message: 'i18n: sync translations from Crowdin'
          pull_request_title: 'i18n: translation updates'
          pull_request_body: 'Automated translation sync from Crowdin.'
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
